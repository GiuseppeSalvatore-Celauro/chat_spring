<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>

    <!-- Login form -->
    <div class="mt-5" id="loginForm">
        <div class="row justify-content-center">
            <div class="col-6 border p-5 rounded">
                <form id="loginForm">
                    <h2 class="text-center fw-bold mb-5">Esegui il login</h2>
                    <div class="mb-3">
                        <label for="username" class="form-label mb-4 fw-bold h4">Username</label>
                        <input type="text" class="form-control" id="loginUsername" placeholder="inserisci il tuo username">
                    </div>
                    <div class="w-full d-flex justify-content-center">
                        <button type="submit" class="btn btn-primary px-5">Accedi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
