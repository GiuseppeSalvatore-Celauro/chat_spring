<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>

  <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="people-circle-white" viewBox="0 0 16 16" fill="white">
      <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
      <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
    </symbol>
    <symbol id="people-circle-black" viewBox="0 0 16 16" fill="black">
      <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
      <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
    </symbol>
  </svg>

    <div class="container-full border flex-row">
      <div class="d-flex">
        <!-- Side bar -->
        <div class="d-flex flex-column flex-shrink-0 bg-light border" style="width: 280px; height: 99.8dvh;">
          <div class="p-3">
            <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none">
              <span class="fs-4">Chat service</span>
            </a>
            <hr>
          </div>
          <ul class="nav nav-pills flex-column mb-auto p-0" id="chatList">
          </ul>
          <hr>
          <div class="p-3">
            <div class="dropdown">
              <a href="#" class="d-flex align-items-center link-dark text-decoration-none dropdown-toggle gap-2" id="dropdownUser2" data-bs-toggle="dropdown" aria-expanded="false">
                <svg class="bi" width="24" height="24" role="img" aria-label="Customers"><use xlink:href="#people-circle-black"/></svg>
                <strong id="userNick">mdo</strong>
              </a>
              <ul class="dropdown-menu text-small shadow" aria-labelledby="dropdownUser2">
                <li>
                    <form id="logoutForm">
                        <button type="submit" class="dropdown-item">
                            Sign out
                        </button>
                    </form>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <!-- Message content -->
        <div id="messagesBox" class="mt-auto d-flex gap-1 flex-column w-full px-3 py-2" style="width: 100dvw;">
        </div>

      </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <script type="module" src="../js/chat.js"></script>
  </body>
</html>
